<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHITOS — Podcast Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
    gap: 30px;
    padding: 40px 20px;
  }

  .page-label {
    color: #555;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .cover-wrapper {
    position: relative;
    width: 600px;
    height: 600px;
  }

  /* Offset shadow */
  .cover-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #E8FF00;
    transform: translate(10px, 10px);
    z-index: 0;
  }

  .cover {
    position: relative;
    width: 600px;
    height: 600px;
    background: #F5F0E8;
    border: 4px solid #111;
    overflow: hidden;
    z-index: 1;
  }

  /* Torn paper texture via repeating gradient */
  .cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.04) 28px, rgba(0,0,0,0.04) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(0,0,0,0.02) 28px, rgba(0,0,0,0.02) 29px);
    pointer-events: none;
    z-index: 10;
  }

  /* BIG background text */
  .bg-text {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 380px;
    color: rgba(0,0,0,0.04);
    top: -60px;
    left: -30px;
    letter-spacing: -20px;
    line-height: 1;
    user-select: none;
    z-index: 1;
  }

  /* Red block top */
  .block-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 12px;
    background: #E63946;
    z-index: 3;
  }

  /* Bold black strip */
  .strip-diagonal {
    position: absolute;
    width: 150%;
    height: 60px;
    background: #111;
    top: 180px;
    left: -30px;
    transform: rotate(-3deg);
    z-index: 4;
    display: flex;
    align-items: center;
    padding-left: 60px;
    overflow: hidden;
  }
  .strip-diagonal span {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #E8FF00;
    letter-spacing: 5px;
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* Main title */
  .title {
    position: absolute;
    top: 30px;
    left: 28px;
    z-index: 5;
    line-height: 0.85;
  }
  .title-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 148px;
    color: #111;
    letter-spacing: -4px;
    display: block;
    -webkit-text-stroke: 2px #111;
  }
  .title-outline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 148px;
    color: transparent;
    -webkit-text-stroke: 2.5px #111;
    display: block;
    letter-spacing: -4px;
    margin-top: -10px;
  }

  /* Subtitle tag */
  .subtitle-tag {
    position: absolute;
    top: 260px;
    left: 28px;
    z-index: 5;
    background: #E63946;
    padding: 4px 12px;
    border: 2px solid #111;
    transform: rotate(1deg);
  }
  .subtitle-tag span {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #F5F0E8;
    font-weight: 700;
  }

  /* SVG doodle area */
  .doodles {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* Coffee mug */
  .mug {
    position: absolute;
    bottom: 120px;
    right: 40px;
    z-index: 6;
  }

  /* Flower */
  .flower {
    position: absolute;
    bottom: 20px;
    left: 30px;
    z-index: 6;
  }

  /* Pen */
  .pen-wrap {
    position: absolute;
    bottom: 80px;
    right: 160px;
    z-index: 6;
    transform: rotate(-25deg);
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: #111;
    z-index: 7;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-top: 4px solid #E8FF00;
  }
  .bottom-bar .ep-num {
    font-size: 10px;
    letter-spacing: 4px;
    color: #E8FF00;
    text-transform: uppercase;
  }
  .bottom-bar .dots {
    display: flex;
    gap: 6px;
  }
  .bottom-bar .dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #E8FF00;
  }
  .bottom-bar .dots span:nth-child(2) { background: #E63946; }
  .bottom-bar .dots span:nth-child(3) { background: #F5F0E8; }

  /* Stamp circle */
  .stamp {
    position: absolute;
    top: 300px;
    right: 20px;
    z-index: 8;
    width: 90px;
    height: 90px;
    border: 3px dashed #111;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(12deg);
    background: #E8FF00;
  }
  .stamp-inner {
    text-align: center;
    font-family: 'Special Elite', cursive;
    font-size: 9px;
    line-height: 1.3;
    color: #111;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Sticker: "raw & real" */
  .sticker {
    position: absolute;
    top: 140px;
    right: 28px;
    z-index: 8;
    background: #E63946;
    border: 3px solid #111;
    padding: 6px 10px;
    transform: rotate(-8deg);
  }
  .sticker span {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    color: #F5F0E8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* X marks / scribbles */
  .x-mark {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: rgba(0,0,0,0.12);
    z-index: 2;
    user-select: none;
  }

  /* DOWNLOAD BUTTON */
  .download-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #E8FF00;
    color: #111;
    border: 4px solid #111;
    padding: 14px 36px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 6px 6px 0 #111;
    transition: box-shadow 0.1s, transform 0.1s;
    position: relative;
  }
  .download-btn:hover {
    box-shadow: 2px 2px 0 #111;
    transform: translate(4px, 4px);
  }
  .download-btn:active {
    box-shadow: 0 0 0 #111;
    transform: translate(6px, 6px);
  }

  .note {
    color: #444;
    font-size: 10px;
    letter-spacing: 2px;
    text-align: center;
  }

  @media print {
    body { background: white; padding: 0; }
    .download-btn, .page-label, .note { display: none; }
    .cover-wrapper { width: 100vw; height: 100vw; }
    .cover { width: 100%; height: 100%; }
  }
</style>
</head>
<body>

<div class="page-label">achitos — podcast cover art</div>

<div class="cover-wrapper" id="cover">
  <div class="cover">

    <!-- lined paper bg text -->
    <div class="bg-text">A</div>

    <!-- top red bar -->
    <div class="block-top"></div>

    <!-- X scribbles -->
    <div class="x-mark" style="top:310px;left:20px;transform:rotate(-5deg)">×</div>
    <div class="x-mark" style="top:380px;left:260px;transform:rotate(8deg);font-size:24px">×</div>

    <!-- Main title -->
    <div class="title">
      <span class="title-main">ACHITOS</span>
      <span class="title-outline">ACHITOS</span>
    </div>

    <!-- Diagonal strip -->
    <div class="strip-diagonal">
      <span>self journals · raw thoughts · daily pages · self journals · raw thoughts ·&nbsp;&nbsp;self journals · raw thoughts · daily pages</span>
    </div>

    <!-- Subtitle tag -->
    <div class="subtitle-tag">
      <span>self journals</span>
    </div>

    <!-- Sticker -->
    <div class="sticker">
      <span>raw & real</span>
    </div>

    <!-- Stamp circle -->
    <div class="stamp">
      <div class="stamp-inner">every<br/>damn<br/>day</div>
    </div>

    <!-- COFFEE MUG SVG -->
    <div class="mug">
      <svg width="80" height="90" viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- steam -->
        <path d="M24 12 Q20 4 24 0" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M34 10 Q30 2 34 0" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M44 12 Q40 4 44 0" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- mug body -->
        <rect x="4" y="18" width="58" height="52" rx="4" fill="#E8FF00" stroke="#111" stroke-width="3"/>
        <!-- handle -->
        <path d="M62 30 Q82 30 82 45 Q82 60 62 60" stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- saucer -->
        <ellipse cx="33" cy="72" rx="36" ry="8" fill="#E63946" stroke="#111" stroke-width="2.5"/>
        <!-- heart on mug -->
        <text x="18" y="50" font-size="22" fill="#E63946" font-family="serif">♥</text>
        <!-- pencil mark on mug -->
        <path d="M42 44 L50 36 L56 38 L48 46 Z" fill="#111"/>
        <path d="M50 36 L52 32 L56 34 L56 38 Z" fill="#111"/>
        <path d="M42 44 L40 50 L46 48 Z" fill="#111"/>
      </svg>
    </div>

    <!-- FLOWER SVG -->
    <div class="flower">
      <svg width="75" height="110" viewBox="0 0 75 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- stem -->
        <path d="M38 105 Q32 80 38 55" stroke="#111" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- leaves -->
        <path d="M38 80 Q20 72 22 58 Q36 64 38 80Z" fill="#111" stroke="#111" stroke-width="1"/>
        <path d="M38 70 Q56 62 55 50 Q41 56 38 70Z" fill="#444" stroke="#111" stroke-width="1"/>
        <!-- petals -->
        <ellipse cx="38" cy="32" rx="8" ry="14" fill="#E63946" stroke="#111" stroke-width="2"/>
        <ellipse cx="38" cy="32" rx="8" ry="14" fill="#E63946" stroke="#111" stroke-width="2" transform="rotate(45 38 32)"/>
        <ellipse cx="38" cy="32" rx="8" ry="14" fill="#E63946" stroke="#111" stroke-width="2" transform="rotate(90 38 32)"/>
        <ellipse cx="38" cy="32" rx="8" ry="14" fill="#E63946" stroke="#111" stroke-width="2" transform="rotate(135 38 32)"/>
        <!-- center -->
        <circle cx="38" cy="32" r="10" fill="#E8FF00" stroke="#111" stroke-width="2.5"/>
        <circle cx="38" cy="32" r="4" fill="#111"/>
      </svg>
    </div>

    <!-- PEN SVG -->
    <div class="pen-wrap">
      <svg width="16" height="110" viewBox="0 0 16 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="8" width="12" height="80" rx="2" fill="#111" stroke="#111" stroke-width="1.5"/>
        <rect x="4" y="10" width="4" height="76" rx="1" fill="#E8FF00"/>
        <path d="M2 88 L8 105 L14 88Z" fill="#111"/>
        <rect x="2" y="4" width="12" height="8" rx="2" fill="#E63946" stroke="#111" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <span class="ep-num">achitos.podcast</span>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>

  </div>
</div>

<button class="download-btn" onclick="downloadPDF()">
  ↓ Download as PDF
</button>
<div class="note">high quality · 600×600px · print-ready</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
async function downloadPDF() {
  const btn = document.querySelector('.download-btn');
  btn.textContent = '⏳ Generating...';
  btn.disabled = true;

  try {
    const cover = document.getElementById('cover');
    const canvas = await html2canvas(cover, {
      scale: 4,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: [150, 150],
      compress: false
    });

    const imgData = canvas.toDataURL('image/png', 1.0);
    pdf.addImage(imgData, 'PNG', 0, 0, 150, 150, '', 'FAST');
    pdf.save('achitos-cover.pdf');
  } catch(e) {
    console.error(e);
    alert('Error generating PDF. Try again!');
  }

  btn.textContent = '↓ Download as PDF';
  btn.disabled = false;
}
</script>
</body>
</html>
