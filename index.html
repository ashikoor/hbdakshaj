<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACHITOS - Brutalist Cover</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        
        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            background: #ff3300;
            color: white;
            border: 3px solid #000;
            padding: 12px 24px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s;
        }
        
        button:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
        
        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }
        
        .cover-container {
            position: relative;
            width: 3000px;
            height: 3000px;
            background: #e8e6e1;
            overflow: hidden;
            border: 20px solid #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform-origin: center;
            max-width: 90vw;
            max-height: 90vw;
        }
        
        /* Brutalist texture overlay */
        .texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none;
            z-index: 10;
        }
        
        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.08;
            z-index: 11;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        /* Concrete blocks */
        .concrete-block {
            position: absolute;
            background: #c4c0b8;
            border: 8px solid #000;
        }
        
        .block-1 {
            width: 800px;
            height: 1200px;
            top: 200px;
            left: 100px;
            background: #b8b4ac;
        }
        
        .block-2 {
            width: 600px;
            height: 400px;
            bottom: 400px;
            right: 200px;
            background: #d4d0c8;
        }
        
        .block-3 {
            width: 400px;
            height: 800px;
            top: 600px;
            right: 100px;
            background: #a8a49c;
        }
        
        /* Stamped elements */
        .stamp {
            position: absolute;
            border: 6px solid #000;
            padding: 20px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 48px;
            text-transform: uppercase;
            background: #fff;
            transform: rotate(-5deg);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }
        
        .stamp-1 {
            top: 300px;
            right: 400px;
            color: #ff3300;
            border-color: #ff3300;
            transform: rotate(8deg);
        }
        
        .stamp-2 {
            bottom: 600px;
            left: 300px;
            font-size: 36px;
            background: #ffcc00;
            border-color: #000;
            transform: rotate(-3deg);
        }
        
        /* Main title */
        .title-container {
            position: absolute;
            bottom: 200px;
            left: 100px;
            z-index: 20;
        }
        
        .main-title {
            font-size: 420px;
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -20px;
            color: #000;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            position: relative;
        }
        
        .main-title::after {
            content: 'ACHITOS';
            position: absolute;
            top: 8px;
            left: 8px;
            color: #ff3300;
            z-index: -1;
            opacity: 0.8;
        }
        
        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 48px;
            margin-top: 40px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 8px;
            border-top: 6px solid #000;
            padding-top: 30px;
            display: inline-block;
        }
        
        /* Coffee mug element - brutalist style */
        .coffee-element {
            position: absolute;
            top: 400px;
            left: 500px;
            width: 300px;
            height: 350px;
            background: #fff;
            border: 8px solid #000;
            z-index: 15;
        }
        
        .coffee-handle {
            position: absolute;
            right: -60px;
            top: 80px;
            width: 80px;
            height: 120px;
            border: 8px solid #000;
            border-left: none;
            border-radius: 0 40px 40px 0;
        }
        
        .coffee-stain {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 150px;
            height: 150px;
            border: 4px solid #8b4513;
            border-radius: 50%;
            opacity: 0.3;
            transform: scale(1, 0.8);
        }
        
        /* Flower element - abstract/geometric */
        .flower-element {
            position: absolute;
            bottom: 800px;
            right: 600px;
            width: 400px;
            height: 400px;
            z-index: 12;
        }
        
        .flower-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: #ff3300;
            border: 6px solid #000;
        }
        
        .petal {
            position: absolute;
            width: 100px;
            height: 200px;
            background: #ffcc00;
            border: 6px solid #000;
            top: 50%;
            left: 50%;
            transform-origin: center bottom;
        }
        
        .petal:nth-child(1) { transform: translate(-50%, -100%) rotate(0deg); }
        .petal:nth-child(2) { transform: translate(-50%, -100%) rotate(72deg); }
        .petal:nth-child(3) { transform: translate(-50%, -100%) rotate(144deg); }
        .petal:nth-child(4) { transform: translate(-50%, -100%) rotate(216deg); }
        .petal:nth-child(5) { transform: translate(-50%, -100%) rotate(288deg); }
        
        /* Barcode */
        .barcode {
            position: absolute;
            top: 200px;
            left: 200px;
            width: 300px;
            height: 150px;
            background: repeating-linear-gradient(
                90deg,
                #000,
                #000 4px,
                transparent 4px,
                transparent 8px
            );
            border: 4px solid #000;
        }
        
        .barcode-text {
            position: absolute;
            bottom: -40px;
            left: 0;
            font-family: 'Space Mono', monospace;
            font-size: 24px;
            letter-spacing: 4px;
        }
        
        /* Torn paper effect */
        .torn-paper {
            position: absolute;
            bottom: 100px;
            right: 100px;
            width: 500px;
            height: 300px;
            background: #fff;
            border: 4px solid #000;
            padding: 30px;
            transform: rotate(2deg);
            z-index: 25;
        }
        
        .torn-paper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(45deg, transparent 33.333%, #fff 33.333%, #fff 66.667%, transparent 66.667%),
                        linear-gradient(-45deg, transparent 33.333%, #fff 33.333%, #fff 66.667%, transparent 66.667%);
            background-size: 20px 40px;
            background-position: 0 -20px;
        }
        
        .handwritten {
            font-family: 'Space Mono', monospace;
            font-size: 32px;
            line-height: 1.6;
            color: #333;
        }
        
        /* Glitch effect lines */
        .glitch-line {
            position: absolute;
            height: 20px;
            background: #000;
            opacity: 0.1;
        }
        
        .glitch-1 { top: 800px; left: 0; width: 100%; }
        .glitch-2 { top: 1500px; left: 0; width: 80%; }
        .glitch-3 { top: 2200px; right: 0; width: 60%; }
        
        /* Date stamp */
        .date-stamp {
            position: absolute;
            top: 1600px;
            right: 300px;
            font-family: 'Space Mono', monospace;
            font-size: 72px;
            font-weight: 700;
            color: #000;
            transform: rotate(90deg);
            border: 6px solid #000;
            padding: 20px 40px;
            background: #fff;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .controls {
                display: none;
            }
            .cover-container {
                box-shadow: none;
                border: 20px solid #000;
                max-width: none;
                max-height: none;
                width: 3000px;
                height: 3000px;
            }
        }
        
        @media screen and (max-width: 1200px) {
            .cover-container {
                transform: scale(0.3);
            }
        }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="downloadPDF()">Download as PDF (Print)</button>
        <button onclick="changeColor()">Randomize Accent</button>
        <button onclick="toggleGrain()">Toggle Texture</button>
    </div>
    
    <div class="cover-container" id="cover">
        <div class="texture"></div>
        <div class="noise" id="noise"></div>
        
        <!-- Concrete blocks -->
        <div class="concrete-block block-1"></div>
        <div class="concrete-block block-2"></div>
        <div class="concrete-block block-3"></div>
        
        <!-- Glitch lines -->
        <div class="glitch-line glitch-1"></div>
        <div class="glitch-line glitch-2"></div>
        <div class="glitch-line glitch-3"></div>
        
        <!-- Barcode -->
        <div class="barcode">
            <div class="barcode-text">VOL-001</div>
        </div>
        
        <!-- Coffee element -->
        <div class="coffee-element">
            <div class="coffee-handle"></div>
            <div class="coffee-stain"></div>
        </div>
        
        <!-- Flower element -->
        <div class="flower-element">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="flower-center"></div>
        </div>
        
        <!-- Stamps -->
        <div class="stamp stamp-1">RAW<br>UNFILTERED</div>
        <div class="stamp stamp-2">SELF<br>JOURNALS</div>
        
        <!-- Date -->
        <div class="date-stamp">2024</div>
        
        <!-- Main Title -->
        <div class="title-container">
            <div class="main-title">ACHITOS</div>
            <div class="subtitle">Personal Archives</div>
        </div>
        
        <!-- Torn paper note -->
        <div class="torn-paper">
            <div class="handwritten">
                Record everything.<br>
                Edit nothing.<br>
                // episode_001
            </div>
        </div>
    </div>

    <script>
        function downloadPDF() {
            window.print();
        }
        
        const colors = ['#ff3300', '#0066ff', '#ffcc00', '#00cc66', '#cc00ff', '#000000'];
        let colorIndex = 0;
        
        function changeColor() {
            colorIndex = (colorIndex + 1) % colors.length;
            const newColor = colors[colorIndex];
            
            document.querySelector('.stamp-1').style.color = newColor;
            document.querySelector('.stamp-1').style.borderColor = newColor;
            document.querySelector('.main-title::after') && document.styleSheets[0].addRule('.main-title::after', `color: ${newColor}`);
            document.querySelector('.flower-center').style.background = newColor;
            
            // Update pseudo-element color via style injection
            const style = document.createElement('style');
            style.textContent = `.main-title::after { color: ${newColor} !important; }`;
            document.head.appendChild(style);
        }
        
        function toggleGrain() {
            const noise = document.getElementById('noise');
            noise.style.display = noise.style.display === 'none' ? 'block' : 'none';
        }
        
        // Scale container to fit screen
        function scaleContainer() {
            const container = document.getElementById('cover');
            const viewportWidth = window.innerWidth;
            const scale = Math.min(1, (viewportWidth - 40) / 3000);
            if (window.innerWidth < 1200) {
                container.style.transform = `scale(${scale * 0.9})`;
            }
        }
        
        window.addEventListener('resize', scaleContainer);
        scaleContainer();
    </script>
</body>
</html>
